---
- name: Upgrade Debian Packages and Check Reboot Status
  hosts: debian_servers
  tasks:

    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        upgrade: safe
        update_cache: yes
      register: apt_output

    - name: Display upgraded packages from APT terminal log
      ansible.builtin.debug:
        var: apt_output.stdout_lines
      when: apt_output.stdout_lines is defined and apt_output.changed

    - name: Check if a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Notify when a reboot is needed
      ansible.builtin.debug:
        msg: "WARNING: {{ inventory_hostname }} requires a reboot to complete updates!"
      when: reboot_required_file.stat.exists

    - name: Show which specific packages triggered the reboot
      ansible.builtin.command: cat /var/run/reboot-required.pkgs
      register: reboot_pkgs
      changed_when: false
      when: reboot_required_file.stat.exists

    - name: Print packages causing the reboot
      ansible.builtin.debug:
        msg: "Packages causing reboot: {{ reboot_pkgs.stdout_lines }}"
      when: reboot_required_file.stat.exists and reboot_pkgs.stdout is defined
