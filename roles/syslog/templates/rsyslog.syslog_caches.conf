# managed by Ansible

# provides RELP syslog caching
module(load="omrelp")
*.* action(type="omrelp" target="192.168.4.33" port="2514")

# provides UDP syslog reception
module(load="imudp")
input(type="imudp" port="514")

# provides TCP syslog reception
module(load="imtcp")
input(type="imtcp" port="514")

