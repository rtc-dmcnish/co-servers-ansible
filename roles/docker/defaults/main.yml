---
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_repo_base_url: "https://download.docker.com/linux"

# Maps ansible_architecture to Docker's repo architecture names
docker_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armhf
